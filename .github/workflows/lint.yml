name: Lint & Auto-fix

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    outputs:
      lint_failed: ${{ steps.lint.outputs.lint_failed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run lint check (no auto-fix)
        id: lint
        run: |
          pre-commit install
          echo "lint_failed=true" >> "$GITHUB_OUTPUT"

          actionlint_exit=0
          precommit_exit=0

          pre-commit run actionlint --all-files || actionlint_exit=$?
          SKIP=actionlint pre-commit run --all-files || precommit_exit=$?

          echo "actionlint exit code: $actionlint_exit"
          echo "pre-commit exit code (excluding actionlint): $precommit_exit"

          if [ "$actionlint_exit" -eq 0 ] && [ "$precommit_exit" -eq 0 ]; then
            echo "lint_failed=false" >> "$GITHUB_OUTPUT"
            echo "Lint check passed - no fixes needed"
          else
            echo "Lint check failed - fixes needed"
            exit 1
          fi

  lint-fix:
    name: Auto-fix Lint Issues
    needs: lint-check
    # Run if lint-check failed (use always() to run even when previous job failed)
    if: always() && needs.lint-check.outputs.lint_failed == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit with auto-fix
        id: fix
        run: |
          pre-commit install
          pwsh -NoProfile -File .\Scripts\Run-PreCommit.ps1
          if ((git status --porcelain).Length -gt 0) {
            "changes=true" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "changes=false" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Configure git
        if: steps.fix.outputs.changes == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit fixes to current branch
        if: steps.fix.outputs.changes == 'true' && (github.actor == github.repository_owner || github.actor == 'dependabot[bot]')
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git add -A
          git commit -m "chore: auto-fix lint issues"
          git push origin $Env:TARGET_BRANCH

      - name: Commit fixes to new branch
        if: steps.fix.outputs.changes == 'true' && !(github.actor == github.repository_owner || github.actor == 'dependabot[bot]')
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          # PowerShell 7.3+ natively raises terminating errors on non-zero exit codes from native executables.
          # Enable it explicitly so git/gh failures are caught by $ErrorActionPreference = 'Stop'.
          if ($PSVersionTable.PSVersion -ge [version]'7.3') {
            $PSNativeCommandUseErrorActionPreference = $true
          }
          $branch = "lint-fixes/${{ github.run_id }}"
          git checkout -b $branch
          git add -A
          git commit -m "chore: auto-fix lint issues"
          git push origin $branch
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            throw 'GitHub CLI (gh) is required to create a pull request but was not found on PATH.'
          }
          $output = gh pr create --title "chore: auto-fix lint issues" --body "Automated lint fixes generated by CI. Merge to apply changes." --head "$branch" --base "$Env:TARGET_BRANCH" 2>&1
          if ($LASTEXITCODE -ne 0) {
            $outputText = $output -join "`n"
            if ($outputText -match 'not permitted to create or approve pull requests') {
              Write-Host "Skipping PR creation due to token permission restrictions. Branch '$branch' was pushed successfully." -ForegroundColor Yellow
            } else {
              Write-Error "gh pr create failed (exit $LASTEXITCODE): $outputText"
            }
          }
